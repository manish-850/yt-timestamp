name: YT Timestamp Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r yt-timestamp.zip \
            manifest.json \
            popup.html \
            popup.js \
            popup.css \
            content.js \
            content.css \
            icons

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: yt-timestamp.zip